apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: prooflink
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: prooflink
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: prooflink
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: prooflink
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: prooflink
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: prooflink-secrets
          env:
            - name: POSTGRES_USER
              value: prooflink
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prooflink-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: prooflink
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - prooflink
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - prooflink
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
