apiVersion: apps/v1
kind: Deployment
metadata:
  name: prooflink-api
  namespace: prooflink
  labels:
    app.kubernetes.io/name: prooflink-api
    app.kubernetes.io/part-of: prooflink
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: prooflink-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prooflink-api
        app.kubernetes.io/part-of: prooflink
    spec:
      serviceAccountName: prooflink-api
      containers:
        - name: api
          image: ghcr.io/flow-link/prooflink:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: prooflink-config
            - secretRef:
                name: prooflink-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
