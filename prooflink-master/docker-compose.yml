services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prooflink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prooflink_dev}
      POSTGRES_DB: prooflink
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prooflink"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prooflink

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prooflink

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://prooflink:${POSTGRES_PASSWORD:-prooflink_dev}@postgres:5432/prooflink
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prooflink

  api-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ["pnpm", "--filter=@prooflink/api", "dev"]
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://prooflink:${POSTGRES_PASSWORD:-prooflink_dev}@postgres:5432/prooflink
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/core/src:/app/packages/core/src
      - ./packages/sdk/src:/app/packages/sdk/src
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prooflink

  dashboard:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ["pnpm", "--filter=@prooflink/dashboard", "dev"]
    ports:
      - "${DASHBOARD_PORT:-3100}:3100"
    volumes:
      - ./apps/dashboard/src:/app/apps/dashboard/src
      - ./apps/dashboard/public:/app/apps/dashboard/public
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3001}
    depends_on:
      - api-dev
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prooflink

volumes:
  postgres_data:
  redis_data:

networks:
  prooflink:
    driver: bridge
