name: Feature Request
description: Suggest a new feature for ProofLink
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in ProofLink.

  - type: dropdown
    id: package
    attributes:
      label: Target Package
      description: Which package should this feature be added to?
      options:
        - "@prooflink/core"
        - "@prooflink/sdk"
        - "@prooflink/shared"
        - "@prooflink/x402-compliance"
        - "@prooflink/mcp-server"
        - "@prooflink/api"
        - "@prooflink/dashboard"
        - "@prooflink/contracts"
        - "New package"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: API Design (if applicable)
      description: Sketch the proposed API surface.
      render: typescript

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Nice to have"
        - "Important"
        - "Critical for adoption"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
