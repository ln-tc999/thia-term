name: Bug Report
description: Report a bug in ProofLink
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      description: Which package is affected?
      options:
        - "@prooflink/core"
        - "@prooflink/sdk"
        - "@prooflink/shared"
        - "@prooflink/x402-compliance"
        - "@prooflink/mcp-server"
        - "@prooflink/api"
        - "@prooflink/dashboard"
        - "@prooflink/contracts"
        - "Multiple packages"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Package version where the bug was observed.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Low — cosmetic or minor inconvenience"
        - "Medium — feature partially broken"
        - "High — feature completely broken"
        - "Critical — data loss or security issue"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime environment details.
      value: |
        - OS:
        - Node.js version:
        - pnpm version:
      render: markdown

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
